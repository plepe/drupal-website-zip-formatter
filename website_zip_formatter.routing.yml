website_zip_formatter.print:
# define additional path parts 'path1', ... so that the route matches nesting
  path: '/website-zip/{file}/{path}/{path0}/{path1}/{path2}/{path3}/{path4}/{path5}/{path6}/{path7}/{path8}/{path9}'
  defaults:
    _controller: '\Drupal\website_zip_formatter\Controller\PrintZipController::serve'
    path: ''
    path0: ''
    path1: ''
    path2: ''
    path3: ''
    path4: ''
    path5: ''
    path6: ''
    path7: ''
    path8: ''
    path9: ''
  requirements:
    _permission: 'access content'
    path: '.*'
  options:
    parameters:
      file:
        type: entity:file
